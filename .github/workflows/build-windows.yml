# CustosAI Clipper — Windows build
# Builds LocalClipper.exe and creates CustosAI-Clipper-Windows.zip
# Run: push to main, or manually trigger from Actions tab
#
# Required secrets (Settings → Secrets → Actions):
#   WHOP_API_KEY   — Whop API bearer token for license validation
#   ADMIN_LICENSE_KEY — (optional) Master key that always validates; for your personal use

name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: local_clipper

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create .env for build
        env:
          WHOP_API_KEY: ${{ secrets.WHOP_API_KEY }}
          WHOP_API_BASE: ${{ secrets.WHOP_API_BASE }}
          ADMIN_LICENSE_KEY: ${{ secrets.ADMIN_LICENSE_KEY }}
        run: |
          $base = if ($env:WHOP_API_BASE) { $env:WHOP_API_BASE } else { "https://api.whop.com/api/v2" }
          $key = if ($env:WHOP_API_KEY) { $env:WHOP_API_KEY } else { "placeholder" }
          $admin = if ($env:ADMIN_LICENSE_KEY) { $env:ADMIN_LICENSE_KEY } else { "" }
          $lines = @("WHOP_API_BASE=$base", "WHOP_API_KEY=$key")
          if ($admin) { $lines += "ADMIN_LICENSE_KEY=$admin" }
          $lines -join "`n" | Out-File -FilePath .env -Encoding utf8
          if ($key -eq "placeholder") { Write-Host "::warning::WHOP_API_KEY secret not set. Add it in Settings → Secrets → Actions for license validation." }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Pre-download FFmpeg for bundling
        run: python scripts/setup_ffmpeg_bundle.py

      - name: Generate app icons
        run: python scripts/setup_icons.py

      - name: Build with PyInstaller
        run: python -m PyInstaller -y LocalClipper.spec

      - name: Create CustosAI-Clipper-Windows.zip
        run: |
          Compress-Archive -Path dist\LocalClipper.exe -DestinationPath ..\CustosAI-Clipper-Windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CustosAI-Clipper-Windows
          path: CustosAI-Clipper-Windows.zip
