# CustosAI Clipper — Windows build
# Builds LocalClipper.exe and creates CustosAI-Clipper-Windows.zip
# Run: push to main, or manually trigger from Actions tab
#
# Required secrets (Settings → Secrets → Actions):
#   WHOP_API_KEY   — Whop API bearer token for license validation
#   ADMIN_LICENSE_KEY — (optional) Master key that always validates; for your personal use

name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: local_clipper
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Visual C++ Redistributables (for compiled dependencies)
        run: |
          # Descargar e instalar VC++ Redistributables (necesario para llama-cpp-python, onnxruntime, etc.)
          $vcUrl = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $vcInstaller = "$env:TEMP\vc_redist.x64.exe"
          Invoke-WebRequest -Uri $vcUrl -OutFile $vcInstaller
          Start-Process -FilePath $vcInstaller -ArgumentList "/install", "/quiet", "/norestart" -Wait
          Write-Host "Visual C++ Redistributables installed"

      - name: Create .env for build
        env:
          WHOP_API_KEY: ${{ secrets.WHOP_API_KEY }}
          WHOP_API_BASE: ${{ secrets.WHOP_API_BASE }}
          ADMIN_LICENSE_KEY: ${{ secrets.ADMIN_LICENSE_KEY }}
        run: |
          $base = if ($env:WHOP_API_BASE) { $env:WHOP_API_BASE } else { "https://api.whop.com/api/v2" }
          $key = if ($env:WHOP_API_KEY) { $env:WHOP_API_KEY } else { "placeholder" }
          $admin = if ($env:ADMIN_LICENSE_KEY) { $env:ADMIN_LICENSE_KEY } else { "" }
          $lines = @("WHOP_API_BASE=$base", "WHOP_API_KEY=$key")
          if ($admin) { $lines += "ADMIN_LICENSE_KEY=$admin" }
          $lines -join "`n" | Out-File -FilePath .env -Encoding utf8
          if ($key -eq "placeholder") { Write-Host "::warning::WHOP_API_KEY secret not set. Add it in Settings → Secrets → Actions for license validation." }

      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Verify critical imports work
        run: |
          Write-Host "Testing critical imports..."
          python -c "import numpy; print('  numpy OK:', numpy.__version__)"
          python -c "import cv2; print('  cv2 OK:', cv2.__version__)"
          python -c "import PIL; print('  PIL OK:', PIL.__version__)"
          python -c "import faster_whisper; print('  faster_whisper OK')"
          python -c "import ctranslate2; print('  ctranslate2 OK:', ctranslate2.__version__)"
          python -c "import onnxruntime; print('  onnxruntime OK:', onnxruntime.__version__)"
          python -c "import psutil; print('  psutil OK:', psutil.__version__)"
          python -c "import llama_cpp; print('  llama_cpp OK:', llama_cpp.__version__)"
          python -c "import customtkinter; print('  customtkinter OK:', customtkinter.__version__)"
          Write-Host "All critical imports successful!"

      - name: Debug - List llama_cpp binaries
        run: |
          Write-Host "=== Listing llama_cpp package contents ==="
          $llamaPath = python -c "import llama_cpp; print(llama_cpp.__path__[0])"
          Write-Host "llama_cpp path: $llamaPath"
          if (Test-Path $llamaPath) {
            Get-ChildItem -Path $llamaPath -Recurse -Include "*.dll","*.pyd" | ForEach-Object {
              Write-Host "  Found: $($_.FullName)"
            }
          }
          
          Write-Host "=== Listing ctranslate2 binaries ==="
          try {
            $ctransPath = python -c "import ctranslate2; print(ctranslate2.__path__[0])"
            Write-Host "ctranslate2 path: $ctransPath"
            Get-ChildItem -Path $ctransPath -Recurse -Include "*.dll","*.pyd" -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "  Found: $($_.FullName)"
            }
          } catch {
            Write-Host "  Could not list ctranslate2 binaries"
          }

      - name: Pre-download FFmpeg for bundling
        run: python scripts/setup_ffmpeg_bundle.py

      - name: Generate app icons
        run: python scripts/setup_icons.py

      - name: Build with PyInstaller
        run: |
          Write-Host "Starting PyInstaller build..."
          python -m PyInstaller -y LocalClipper.spec 2>&1 | Tee-Object -FilePath pyinstaller.log
          Write-Host "PyInstaller build completed"

      - name: Debug - Check built executable dependencies
        if: failure()
        run: |
          Write-Host "=== PyInstaller log (last 100 lines) ==="
          if (Test-Path pyinstaller.log) {
            Get-Content pyinstaller.log -Tail 100
          }
          
          Write-Host "=== Checking dist folder ==="
          if (Test-Path dist) {
            Get-ChildItem -Path dist -Recurse | ForEach-Object {
              Write-Host "  $($_.FullName)"
            }
          }

      - name: Test executable launches
        run: |
          $exePath = "dist\LocalClipper.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "Executable not found at $exePath"
            exit 1
          }
          Write-Host "Executable found: $exePath"
          
          # List all files in dist to verify completeness
          Write-Host "=== Files in dist folder ==="
          Get-ChildItem -Path dist | ForEach-Object {
            $size = if ($_.Length -gt 1MB) { "{0:N2} MB" -f ($_.Length / 1MB) } else { "{0:N2} KB" -f ($_.Length / 1KB) }
            Write-Host "  $($_.Name) - $size"
          }

      - name: Create CustosAI-Clipper-Windows.zip
        run: |
          $zipPath = "..\CustosAI-Clipper-Windows.zip"
          Compress-Archive -Path dist\* -DestinationPath $zipPath -Force
          Write-Host "Created: $zipPath"
          $size = (Get-Item $zipPath).Length
          Write-Host "Zip size: {0:N2} MB" -f ($size / 1MB)

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CustosAI-Clipper-Windows
          path: CustosAI-Clipper-Windows.zip
          if-no-files-found: error
